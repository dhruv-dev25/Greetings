<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Holi</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Cinzel+Decorative:wght@700;900&family=Crimson+Pro:ital,wght@0,400;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- CSS powder dots background -->
<div class="bg-dots" id="bgDots"></div>

<!-- INPUT -->
<div id="inputScreen">
  <div class="inp-title">✦ Happy Holi ✦</div>
  <div class="inp-sub">Enter your name to receive a greeting</div>
  <div class="inp-row">
    <input id="nameInput" type="text" placeholder="Your name…" autocomplete="off" />
    <button id="submitBtn" onclick="showCard()">OPEN →</button>
  </div>
</div>

<!-- CARD -->
<div id="card">
  <div class="ctr"></div><div class="cbl"></div>
  <div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div>
  <div class="sr" style="width:300px;height:300px;top:-90px;right:-90px;background:radial-gradient(circle,rgba(255,100,0,.65),transparent 70%);animation-delay:.2s;"></div>
  <div class="sr" style="width:250px;height:250px;bottom:-70px;left:-70px;background:radial-gradient(circle,rgba(160,0,255,.65),transparent 70%);animation-delay:.5s;"></div>
  <div class="sr" style="width:180px;height:180px;top:20%;left:-45px;background:radial-gradient(circle,rgba(0,210,170,.55),transparent 70%);animation-delay:.85s;"></div>

  <div class="festival-label">✦ &nbsp; Festival of Colors &nbsp; ✦</div>
  <div class="main-title">Happy Holi</div>

  <div class="divider"><div class="dline"></div><div class="ddot">◆ ◆ ◆</div><div class="dline"></div></div>

  <div class="dear-line">Dear,</div>
  <div class="dear-name" id="displayName">—</div>

  <div class="divider" style="margin:.9rem 0"><div class="dline"></div><div class="ddot">· · ·</div><div class="dline"></div></div>

  <div class="message-body">
    May your life be forever painted<br>
    with the colors of<br>
    <span class="hw c1">Happiness</span> &nbsp;·&nbsp;
    <span class="hw c2">Success</span> &nbsp;·&nbsp;
    <span class="hw c3">Health</span> &nbsp;·&nbsp;
    <span class="hw c4">Prosperity</span>
  </div>

  <div class="divider" style="margin:1.3rem 0 .85rem"><div class="dline"></div><div class="ddot">✦</div><div class="dline"></div></div>

  <div class="wishing-line">Wishing You A Colorful</div>
  <div class="holi-row">
    <span class="hl">H</span><span class="hl">A</span><span class="hl">P</span><span class="hl">P</span><span class="hl">Y</span>
    <span class="hl-sep">·</span>
    <span class="hl">H</span><span class="hl">O</span><span class="hl">L</span><span class="hl">I</span>
  </div>

  <div class="divider"><div class="dline"></div><div class="ddot">◆ ◆ ◆</div><div class="dline"></div></div>

  <div class="from-section">
    <div class="from-label">From</div>
    <div class="from-name">Dhruv</div>
  </div>
</div>

<!-- burst.js FIRST so window.burst exists before main.js calls it -->
<script src="burst.js"></script>
<script src="main.js"></script>
</body>
</html>
